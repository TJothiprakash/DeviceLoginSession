spring.application.name=dbbasedsession


# Spring Security default user for console / API login
spring.security.user.name=admin
spring.security.user.password=admin123
spring.security.user.roles=ADMIN


# ===============================
# MySQL Database Configuration
# ===============================

# JDBC URL (replace DB_NAME with your database)
spring.datasource.url=jdbc:mysql://localhost:3306/singleSessionDB?useSSL=false&serverTimezone=UTC

# Database credentials
spring.datasource.username=admin
spring.datasource.password=admin@123

# JDBC Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver


# Connection pool (HikariCP default)
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.max-lifetime=600000

# Optional: logging SQL
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
